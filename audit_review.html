cs/anthropic-cookbook)\n", "table_row": {"skill": "llm-app-patterns", "evidence_file": "`skills/llm-app-patterns/SKILL.md`", "skill_url_cell": "[link](https://github.com/ForaeFactory/antigravity-skills/blob/main/skills/llm-app-patterns/SKILL.md)", "why_research_related": "Supports research engineering by providing production patterns for building LLM applications, including RAG pipelines that ground model outputs in a document corpus. It is relevant when research involves prototyping or evaluating agent architectures, retrieval setups, or LLMOps monitoring for AI systems.", "function_explanation": "Production-ready patterns for building LLM applications. Covers RAG pipelines, agent architectures, prompt engineering patterns, and LLMOps monitoring. Use when designing AI applications, implementing RAG, building agents, or setting up LLM observability.", "execution_flow": "Designing LLM-powered applications → Implementing RAG (Retrieval-Augmented Generation) → Building AI agents with tools → Setting up LLMOps monitoring → Choosing between agent architectures", "evidence": "- Implementing RAG (Retrieval-Augmented Generation)"}, "highlight_keywords": ["Production-ready", "patterns", "building", "applications", "Covers RAG pipelines", "Covers", "pipelines", "agent architectures", "agent", "architectures", "prompt engineering patterns", "prompt", "engineering", "LLMOps monitoring", "LLMOps", "monitoring", "designing AI applications", "designing", "implementing RAG", "implementing", "building agents", "agents", "setting up LLM observability", "setting", "observability"]}, {"id": "k8s-security-policies__02_literature_review_writing_citation_part2", "skill_name": "k8s-security-policies", "repo": "sickn33/antigravity-awesome-skills", "theme": "02_literature_review_writing_citation_part2", "theme_display": "02 Literature Review & Citation (Part 2)", "status": "PARTIAL", "audit_reason": "SKILL.md covers NetworkPolicy, PodSecurityPolicy, RBAC, Pod Security Standards, pod security contexts, and admission control with OPA Gatekeeper; the function explanation adds Istio service mesh security and explicit compliance frameworks (CIS/NIST) as covered items, which are not presented as core implemented sections in SKILL.md (Istio is included, but PodSecurityPolicy is emphasized in SKILL.md while the explanation frames broader scope).", "skill_url": "https://github.com/sickn33/antigravity-awesome-skills/blob/main/skills/k8s-security-policies/SKILL.md", "skill_md_content": "---\nname: k8s-security-policies\ndescription: \"Implement Kubernetes security policies including NetworkPolicy, PodSecurityPolicy, and RBAC for production-grade security. Use when securing Kubernetes clusters, implementing network isolation, or ...\"\nrisk: unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n# Kubernetes Security Policies\n\nComprehensive guide for implementing NetworkPolicy, PodSecurityPolicy, RBAC, and Pod Security Standards in Kubernetes.\n\n## Do not use this skill when\n\n- The task is unrelated to kubernetes security policies\n- You need a different domain or tool outside this scope\n\n## Instructions\n\n- Clarify goals, constraints, and required inputs.\n- Apply relevant best practices and validate outcomes.\n- Provide actionable steps and verification.\n- If detailed examples are required, open `resources/implementation-playbook.md`.\n\n## Purpose\n\nImplement defense-in-depth security for Kubernetes clusters using network policies, pod security standards, and RBAC.\n\n## Use this skill when\n\n- Implement network segmentation\n- Configure pod security standards\n- Set up RBAC for least-privilege access\n- Create security policies for compliance\n- Implement admission control\n- Secure multi-tenant clusters\n\n## Pod Security Standards\n\n### 1. Privileged (Unrestricted)\n```yaml\napiVersion: v1\nkind: Namespace\nmetadata:\n  name: privileged-ns\n  labels:\n    pod-security.kubernetes.io/enforce: privileged\n    pod-security.kubernetes.io/audit: privileged\n    pod-security.kubernetes.io/warn: privileged\n```\n\n### 2. Baseline (Minimally restrictive)\n```yaml\napiVersion: v1\nkind: Namespace\nmetadata:\n  name: baseline-ns\n  labels:\n    pod-security.kubernetes.io/enforce: baseline\n    pod-security.kubernetes.io/audit: baseline\n    pod-security.kubernetes.io/warn: baseline\n```\n\n### 3. Restricted (Most restrictive)\n```yaml\napiVersion: v1\nkind: Namespace\nmetadata:\n  name: restricted-ns\n  labels:\n    pod-security.kubernetes.io/enforce: restricted\n    pod-security.kubernetes.io/audit: restricted\n    pod-security.kubernetes.io/warn: restricted\n```\n\n## Network Policies\n\n### Default Deny All\n```yaml\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: default-deny-all\n  namespace: production\nspec:\n  podSelector: {}\n  policyTypes:\n  - Ingress\n  - Egress\n```\n\n### Allow Frontend to Backend\n```yaml\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: allow-frontend-to-backend\n  namespace: production\nspec:\n  podSelector:\n    matchLabels:\n      app: backend\n  policyTypes:\n  - Ingress\n  ingress:\n  - from:\n    - podSelector:\n        matchLabels:\n          app: frontend\n    ports:\n    - protocol: TCP\n      port: 8080\n```\n\n### Allow DNS\n```yaml\napiVersion: networking.k8s.io/v1\nkind: NetworkPolicy\nmetadata:\n  name: allow-dns\n  namespace: production\nspec:\n  podSelector: {}\n  policyTypes:\n  - Egress\n  egress:\n  - to:\n    - namespaceSelector:\n        matchLabels:\n          name: kube-system\n    ports:\n    - protocol: UDP\n      port: 53\n```\n\n**Reference:** See `assets/network-policy-template.yaml`\n\n## RBAC Configuration\n\n### Role (Namespace-scoped)\n```yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind: Role\nmetadata:\n  name: pod-reader\n  namespace: production\nrules:\n- apiGroups: [\"\"]\n  resources: [\"pods\"]\n  verbs: [\"get\", \"watch\", \"list\"]\n```\n\n### ClusterRole (Cluster-wide)\n```yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind: ClusterRole\nmetadata:\n  name: secret-reader\nrules:\n- apiGroups: [\"\"]\n  resources: [\"secrets\"]\n  verbs: [\"get\", \"watch\", \"list\"]\n```\n\n### RoleBinding\n```yaml\napiVersion: rbac.authorization.k8s.io/v1\nkind: RoleBinding\nmetadata:\n  name: read-pods\n  namespace: production\nsubjects:\n- kind: User\n  name: jane\n  apiGroup: rbac.authorization.k8s.io\n- kind: ServiceAccount\n  name: default\n  namespace: production\nroleRef:\n  kind: Role\n  name: pod-reader\n  apiGroup: rbac.authorization.k8s.io\n```\n\n**Reference:** See `references/rbac-patterns.md`\n\n## Pod Security Context\n\n### Restricted Pod\n```yaml\napiVersion: v1\nkind: Pod\nmetadata:\n  name: secure-pod\nspec:\n  securityContext:\n    runAsNonRoot: true\n    runAsUser: 1000\n    fsGroup: 1000\n    seccompProfile:\n      type: RuntimeDefault\n  containers:\n  - name: app\n    image: myapp:1.0\n    securityContext:\n      allowPrivilegeEscalation: false\n      readOnlyRootFilesystem: true\n      capabilities:\n        drop:\n        - ALL\n```\n\n## Policy Enforcement with OPA Gatekeeper\n\n### ConstraintTemplate\n```yaml\napiVersion: templates.gatekeeper.sh/v1\nkind: ConstraintTemplate\nmetadata:\n  name: k8srequiredlabels\nspec:\n  crd:\n    spec:\n      names:\n        kind: K8sRequiredLabels\n      validation:\n        openAPIV3Schema:\n          type: object\n          properties:\n            labels:\n              type: array\n              items:\n                type: string\n  targets:\n    - target: admission.k8s.gatekeeper.sh\n      rego: |\n        package k8srequiredlabels\n        violation[{\"msg\": msg, \"details\": {\"missing_labels\": missing}}] {\n          provided := {label | input.review.object.metadata.labels[label]}\n          required := {label | label := input.parameters.labels[_]}\n          missing := required - provided\n          count(missing) > 0\n          msg := sprintf(\"missing required labels: %v\", [missing])\n        }\n```\n\n### Constraint\n```yaml\napiVersion: constraints.gatekeeper.sh/v1beta1\nkind: K8sRequiredLabels\nmetadata:\n  name: require-app-label\nspec:\n  match:\n    kinds:\n      - apiGroups: [\"apps\"]\n        kinds: [\"Deployment\"]\n  parameters:\n    labels: [\"app\", \"environment\"]\n```\n\n## Service Mesh Security (Istio)\n\n### PeerAuthentication (mTLS)\n```yaml\napiVersion: security.istio.io/v1beta1\nkind: PeerAuthentication\nmetadata:\n  name: default\n  namespace: production\nspec:\n  mtls:\n    mode: STRICT\n```\n\n### AuthorizationPolicy\n```yaml\napiVersion: security.istio.io/v1beta1\nkind: AuthorizationPolicy\nmetadata:\n  name: allow-frontend\n  namespace: production\nspec:\n  selector:\n    matchLabels:\n      app: backend\n  action: ALLOW\n  rules:\n  - from:\n    - source:\n        principals: [\"cluster.local/ns/production/sa/frontend\"]\n```\n\n## Best Practices\n\n1. **Implement Pod Security Standards** at namespace level\n2. **Use Network Policies** for network segmentation\n3. **Apply least-privilege RBAC** for all service accounts\n4. **Enable admission control** (OPA Gatekeeper/Kyverno)\n5. **Run containers as non-root**\n6. **Use read-only root filesystem**\n7. **Drop all capabilities** unless needed\n8. **Implement resource quotas** and limit ranges\n9. **Enable audit logging** for security events\n10. **Regular security scanning** of images\n\n## Compliance Frameworks\n\n### CIS Kubernetes Benchmark\n- Use RBAC authorization\n- Enable audit logging\n- Use Pod Security Standards\n- Configure network policies\n- Implement secrets encryption at rest\n- Enable node authentication\n\n### NIST Cybersecurity Framework\n- Implement defense in depth\n- Use network segmentation\n- Configure security monitoring\n- Implement access controls\n- Enable logging and monitoring\n\n## Troubleshooting\n\n**NetworkPolicy not working:**\n```bash\n# Check if CNI supports NetworkPolicy\nkubectl get nodes -o wide\nkubectl describe networkpolicy <name>\n```\n\n**RBAC permission denied:**\n```bash\n# Check effective permissions\nkubectl auth can-i list pods --as system:serviceaccount:default:my-sa\nkubectl auth can-i '*' '*' --as system:serviceaccount:default:my-sa\n```\n\n## Reference Files\n\n- `assets/network-policy-template.yaml` - Network policy examples\n- `assets/pod-security-template.yaml` - Pod security policies\n- `references/rbac-patterns.md` - RBAC configuration patterns\n\n## Related Skills\n\n- `k8s-manifest-generator` - For creating secure manifests\n- `gitops-workflow` - For automated policy deployment\n", "table_row": {"skill": "k8s-security-policies", "evidence_file": "`skills/k8s-security-policies/SKILL.md`", "skill_url_cell": "[link](https://github.com/sickn33/antigravity-awesome-skills/blob/main/skills/k8s-security-policies/SKILL.md)", "why_research_related": "This skill aids cybersecurity and cloud computing research by providing standardized configurations for Kubernetes security policies. Researchers can use these templates to establish secure, isolated containerized environments for evaluating defense-in-depth strategies, network segmentation, and access control mechanisms.", "function_explanation": "Implements Kubernetes security policies including Pod Security Standards (Privileged, Baseline, Restricted levels), NetworkPolicy for network segmentation, and RBAC for least-privilege access control. Also covers OPA Gatekeeper admission control, Istio service mesh security with mTLS, pod security contexts, and compliance frameworks (CIS Kubernetes Benchmark, NIST).", "execution_flow": "The task is unrelated to kubernetes security policies → You need a different domain or tool outside this scope → Clarify goals, constraints, and required inputs → Apply relevant best practices and validate outcomes → Provide actionable steps and verification → If detailed examples are required, open → Implement network segmentation", "evidence": "skills/k8s-security-policies/SKILL.md"}, "highlight_keywords": ["Implements", "Kubernetes", "security", "policies", "Standards", "Privileged", "Baseline", "Restricted levels", "Restricted", "levels", "NetworkPolicy network segmentation", "NetworkPolicy", "network", "segmentation", "least-privilege", "access", "control", "covers", "Gatekeeper", "admission", "Istio", "service", "pod security contexts", "contexts", "compliance frameworks", "compliance", "frameworks", "CIS Kubernetes Benchmark", "Benchmark"]}, {"id": "tdd-orchestrator__02_literature_review_writing_citation_part2", "skill_name": "tdd-orchestrator", "repo": "sickn33/antigravity-awesome-skills", "theme": "02_literature_review_writing_citation_part2", "theme_display": "02 Literature Review & Citation (Part 2)", "status": "PARTIAL", "audit_reason": "Matches core purpose (red-green-refactor enforcement, multi-agent coordination, best practices/checklists, AI-assisted testing), but the Function Explanation implies concrete features like “Provides guidance, checklists” (supported) and the Evidence lists predictive test failure analysis (supported). However, it omits several co-equal major capability areas emphasized in SKILL.md (e.g., metrics/quality gates, property-based/mutation/fuzz, legacy code/refactoring, governance), and it frames the skill mainly as guidance rather than also orchestration/automation and governance.", "skill_url": "https://github.com/sickn33/antigravity-awesome-skills/blob/main/skills/tdd-orchestrator/SKILL.md", "skill_md_content": "---\nname: tdd-orchestrator\ndescription: |\nrisk: unknown\nsource: community\ndate_added: \"2026-02-27\"\n---\n\n## Use this skill when\n\n- Working on tdd orchestrator tasks or workflows\n- Needing guidance, best practices, or checklists for tdd orchestrator\n\n## Do not use this skill when\n\n- The task is unrelated to tdd orchestrator\n- You need a different domain or tool outside this scope\n\n## Instructions\n\n- Clarify goals, constraints, and required inputs.\n- Apply relevant best practices and validate outcomes.\n- Provide actionable steps and verification.\n- If detailed examples are required, open `resources/implementation-playbook.md`.\n\nYou are an expert TDD orchestrator specializing in comprehensive test-driven development coordination, modern TDD practices, and multi-agent workflow management.\n\n## Expert Purpose\n\nElite TDD orchestrator focused on enforcing disciplined test-driven development practices across complex software projects. Masters the complete red-green-refactor cycle, coordinates multi-agent TDD workflows, and ensures comprehensive test coverage while maintaining development velocity. Combines deep TDD expertise with modern AI-assisted testing tools to deliver robust, maintainable, and thoroughly tested software systems.\n\n## Capabilities\n\n### TDD Discipline & Cycle Management\n\n- Complete red-green-refactor cycle orchestration and enforcement\n- TDD rhythm establishment and maintenance across development teams\n- Test-first discipline verification and automated compliance checking\n- Refactoring safety nets and regression prevention strategies\n- TDD flow state optimization and developer productivity enhancement\n- Cycle time measurement and optimization for rapid feedback loops\n- TDD anti-pattern detection and prevention (test-after, partial coverage)\n\n### Multi-Agent TDD Workflow Coordination\n\n- Orchestration of specialized testing agents (unit, integration, E2E)\n- Coordinated test suite evolution across multiple development streams\n- Cross-team TDD practice synchronization and knowledge sharing\n- Agent task delegation for parallel test development and execution\n- Workflow automation for continuous TDD compliance monitoring\n- Integration with development tools and IDE TDD plugins\n- Multi-repository TDD governance and consistency enforcement\n\n### Modern TDD Practices & Methodologies\n\n- Classic TDD (Chicago School) implementation and coaching\n- London School (mockist) TDD practices and double management\n- Acceptance Test-Driven Development (ATDD) integration\n- Behavior-Driven Development (BDD) workflow orchestration\n- Outside-in TDD for feature development and user story implementation\n- Inside-out TDD for component and library development\n- Hexagonal architecture TDD with ports and adapters testing\n\n### AI-Assisted Test Generation & Evolution\n\n- Intelligent test case generation from requirements and user stories\n- AI-powered test data creation and management strategies\n- Machine learning for test prioritization and execution optimization\n- Natural language to test code conversion and automation\n- Predictive test failure analysis and proactive test maintenance\n- Automated test evolution based on code changes and refactoring\n- Smart test doubles and mock generation with realistic behaviors\n\n### Test Suite Architecture & Organization\n\n- Test pyramid optimization and balanced testing strategy implementation\n- Comprehensive test categorization (unit, integration, contract, E2E)\n- Test suite performance optimization and parallel execution strategies\n- Test isolation and independence verification across all test levels\n- Shared test utilities and common testing infrastructure management\n- Test data management and fixture orchestration across test types\n- Cross-cutting concern testing (security, performance, accessibility)\n\n### TDD Metrics & Quality Assurance\n\n- Comprehensive TDD metrics collection and analysis (cycle time, coverage)\n- Test quality assessment through mutation testing and fault injection\n- Code coverage tracking with meaningful threshold establishment\n- TDD velocity measurement and team productivity optimization\n- Test maintenance cost analysis and technical debt prevention\n- Quality gate enforcement and automated compliance reporting\n- Trend analysis for continuous improvement identification\n\n### Framework & Technology Integration\n\n- Multi-language TDD support (Java, C#, Python, JavaScript, TypeScript, Go)\n- Testing framework expertise (JUnit, NUnit, pytest, Jest, Mocha, testing/T)\n- Test runner optimization and IDE integration across development environments\n- Build system integration (Maven, Gradle, npm, Cargo, MSBuild)\n- Continuous Integration TDD pipeline design and execution\n- Cloud-native testing infrastructure and containerized test environments\n- Microservices TDD patterns and distributed system testing strategies\n\n### Property-Based & Advanced Testing Techniques\n\n- Property-based testing implementation with QuickCheck, Hypothesis, fast-check\n- Generative testing strategies and property discovery methodologies\n- Mutation testing orchestration for test suite quality validation\n- Fuzz testing integration and security vulnerability discovery\n- Contract testing coordination between services and API boundaries\n- Snapshot testing for UI components and API response validation\n- Chaos engineering integration with TDD for resilience validation\n\n### Test Data & Environment Management\n\n- Test data generation strategies and realistic dataset creation\n- Database state management and transactional test isolation\n- Environment provisioning and cleanup automation\n- Test doubles orchestration (mocks, stubs, fakes, spies)\n- External dependency management and service virtualization\n- Test environment configuration and infrastructure as code\n- Secrets and credential management for testing environments\n\n### Legacy Code & Refactoring Support\n\n- Legacy code characterization through comprehensive test creation\n- Seam identification and dependency breaking for testability improvement\n- Refactoring orchestration with safety net establishment\n- Golden master testing for legacy system behavior preservation\n- Approval testing implementation for complex output validation\n- Incremental TDD adoption strategies for existing codebases\n- Technical debt reduction through systematic test-driven refactoring\n\n### Cross-Team TDD Governance\n\n- TDD standard establishment and organization-wide implementation\n- Training program coordination and developer skill assessment\n- Code review processes with TDD compliance verification\n- Pair programming and mob programming TDD session facilitation\n- TDD coaching and mentorship program management\n- Best practice documentation and knowledge base maintenance\n- TDD culture transformation and organizational change management\n\n### Performance & Scalability Testing\n\n- Performance test-driven development for scalability requirements\n- Load testing integration within TDD cycles for performance validation\n- Benchmark-driven development with automated performance regression detection\n- Memory usage and resource consumption testing automation\n- Database performance testing and query optimization validation\n- API performance contracts and SLA-driven test development\n- Scalability testing coordination for distributed system components\n\n## Behavioral Traits\n\n- Enforces unwavering test-first discipline and maintains TDD purity\n- Champions comprehensive test coverage without sacrificing development speed\n- Facilitates seamless red-green-refactor cycle adoption across teams\n- Prioritizes test maintainability and readability as first-class concerns\n- Advocates for balanced testing strategies avoiding over-testing and under-testing\n- Promotes continuous learning and TDD practice improvement\n- Emphasizes refactoring confidence through comprehensive test safety nets\n- Maintains development momentum while ensuring thorough test coverage\n- Encourages collaborative TDD practices and knowledge sharing\n- Adapts TDD approaches to different project contexts and team dynamics\n\n## Knowledge Base\n\n- Kent Beck's original TDD principles and modern interpretations\n- Growing Object-Oriented Software Guided by Tests methodologies\n- Test-Driven Development by Example and advanced TDD patterns\n- Modern testing frameworks and toolchain ecosystem knowledge\n- Refactoring techniques and automated refactoring tool expertise\n- Clean Code principles applied specifically to test code quality\n- Domain-Driven Design integration with TDD and ubiquitous language\n- Continuous Integration and DevOps practices for TDD workflows\n- Agile development methodologies and TDD integration strategies\n- Software architecture patterns that enable effective TDD practices\n\n## Response Approach\n\n1. **Assess TDD readiness** and current development practices maturity\n2. **Establish TDD discipline** with appropriate cycle enforcement mechanisms\n3. **Orchestrate test workflows** across multiple agents and development streams\n4. **Implement comprehensive metrics** for TDD effectiveness measurement\n5. **Coordinate refactoring efforts** with safety net establishment\n6. **Optimize test execution** for rapid feedback and development velocity\n7. **Monitor compliance** and provide continuous improvement recommendations\n8. **Scale TDD practices** across teams and organizational boundaries\n\n## Example Interactions\n\n- \"Orchestrate a complete TDD implementation for a new microservices project\"\n- \"Design a multi-agent workflow for coordinated unit and integration testing\"\n- \"Establish TDD compliance monitoring and automated quality gate enforcement\"\n- \"Implement property-based testing strategy for complex business logic validation\"\n- \"Coordinate legacy code refactoring with comprehensive test safety net creation\"\n- \"Design TDD metrics dashboard for team productivity and quality tracking\"\n- \"Create cross-team TDD governance framework with automated compliance checking\"\n- \"Orchestrate performance TDD workflow with load testing integration\"\n- \"Implement mutation testing pipeline for test suite quality validation\"\n- \"Design AI-assisted test generation workflow for rapid TDD cycle acceleration\"\n", "table_row": {"skill": "tdd-orchestrator", "evidence_file": "`skills/tdd-orchestrator/SKILL.md`", "skill_url_cell": "[link](https://github.com/sickn33/antigravity-awesome-skills/blob/main/skills/tdd-orchestrator/SKILL.md)", "why_research_related": "This skill can support research software development by coordinating strict test-driven development practices to improve correctness and maintainability of code used in research workflows. It emphasizes disciplined red-green-refactor cycles and comprehensive test coverage, which can increase confidence in software outputs used for analysis or experiments.", "function_explanation": "TDD orchestrator specializing in red-green-refactor discipline, multi-agent workflow coordination, and comprehensive test-driven development practices. Provides guidance, checklists, and best practices for TDD enforcement with AI-assisted testing and modern frameworks. Use for TDD implementation and coordination.", "execution_flow": "Orchestration of specialized testing agents (unit, integration, E2E) → Coordinated test suite evolution across multiple development streams → Cross-team TDD practice synchronization and knowledge sharing → Agent task delegation for parallel test development and execution → Workflow automation for continuous TDD compliance monitoring → Integration with development tools and IDE TDD plugins → Multi-repository TDD governance and consistency enforcement", "evidence": "- Predictive test failure analysis and proactive test maintenance"}, "highlight_keywords": ["orchestrator", "specializing", "red-green-refactor", "discipline", "multi-agent workflow coordination", "multi-agent", "workflow", "coordination", "comprehensive test-driven development practices", "comprehensive", "test-driven", "development", "practices", "guidance", "checklists", "enforcement", "AI-assisted", "testing", "modern", "frameworks", "implementation"]}, {"id": "cairo-vulnerability-scanner__02_literature_review_writing_citation_part2", "skill_name": "cairo-vulnerability-scanner", "repo": "trailofbits/skills", "theme": "02_literature_review_writing_citation_part2", "theme_display": "02 Literature Review & Citation (Part 2)", "status": "PARTIAL", "audit_reason": "Correct that it scans Cairo/StarkNet contracts for 6 vulnerability patterns and includes workflows for L1 handlers, signature review, bridge auditing, and reporting with locations/severity/fixes, plus Caracal integration. However, the Function Explanation adds “access control” broadly (some patterns cover caller validation) but also mentions patterns not aligned with the SKILL.md list (e.g., SKILL.md patterns include storage collision, felt252 boundaries, unvalidated contract address; the explanation highlights arithmetic/access control/cross-layer messaging and omits storage collision and other listed patterns).", "skill_url": "https://github.com/trailofbits/skills/blob/main/plugins/building-secure-contracts/skills/cairo-vulnerability-scanner/SKILL.md", "skill_md_content": "---\nname: cairo-vulnerability-scanner\ndescription: Scans Cairo/StarkNet smart contracts for 6 critical vulnerabilities including felt252 arithmetic overflow, L1-L2 messaging issues, address conversion problems, and signature replay. Use when auditing StarkNet projects.\n---\n\n# Cairo/StarkNet Vulnerability Scanner\n\n## 1. Purpose\n\nSystematically scan Cairo smart contracts on StarkNet for platform-specific security vulnerabilities related to arithmetic, cross-layer messaging, and cryptographic operations. This skill encodes 6 critical vulnerability patterns unique to Cairo/StarkNet ecosystem.\n\n## 2. When to Use This Skill\n\n- Auditing StarkNet smart contracts (Cairo)\n- Reviewing L1-L2 bridge implementations\n- Pre-launch security assessment of StarkNet applications\n- Validating cross-layer message handling\n- Reviewing signature verification logic\n- Assessing L1 handler functions\n\n## 3. Platform Detection\n\n### File Extensions & Indicators\n- **Cairo files**: `.cairo`\n\n### Language/Framework Markers\n```rust\n// Cairo contract indicators\n#[contract]\nmod MyContract {\n    use starknet::ContractAddress;\n\n    #[storage]\n    struct Storage {\n        balance: LegacyMap<ContractAddress, felt252>,\n    }\n\n    #[external(v0)]\n    fn transfer(ref self: ContractState, to: ContractAddress, amount: felt252) {\n        // Contract logic\n    }\n\n    #[l1_handler]\n    fn handle_deposit(ref self: ContractState, from_address: felt252, amount: u256) {\n        // L1 message handler\n    }\n}\n\n// Common patterns\nfelt252, u128, u256\nContractAddress, EthAddress\n#[external(v0)], #[l1_handler], #[constructor]\nget_caller_address(), get_contract_address()\nsend_message_to_l1_syscall\n```\n\n### Project Structure\n- `src/contract.cairo` - Main contract implementation\n- `src/lib.cairo` - Library modules\n- `tests/` - Contract tests\n- `Scarb.toml` - Cairo project configuration\n\n### Tool Support\n- **Caracal**: Trail of Bits static analyzer for Cairo\n- Installation: `pip install caracal`\n- Usage: `caracal detect src/`\n- **cairo-test**: Built-in testing framework\n- **Starknet Foundry**: Testing and development toolkit\n\n---\n\n## 4. How This Skill Works\n\nWhen invoked, I will:\n\n1. **Search your codebase** for Cairo files\n2. **Analyze each contract** for the 6 vulnerability patterns\n3. **Report findings** with file references and severity\n4. **Provide fixes** for each identified issue\n5. **Check L1-L2 interactions** for messaging vulnerabilities\n\n---\n\n## 5. Example Output\n\nWhen vulnerabilities are found, you'll get a report like this:\n\n```\n=== CAIRO/STARKNET VULNERABILITY SCAN RESULTS ===\n\n\n---\n\n## 5. Vulnerability Patterns (6 Patterns)\n\nI check for 6 critical vulnerability patterns unique to Cairo/Starknet. For detailed detection patterns, code examples, mitigations, and testing strategies, see [VULNERABILITY_PATTERNS.md](resources/VULNERABILITY_PATTERNS.md).\n\n### Pattern Summary:\n\n1. **Unchecked Arithmetic** ⚠️ CRITICAL - Integer overflow/underflow in felt252\n2. **Storage Collision** ⚠️ CRITICAL - Conflicting storage variable hashes\n3. **Missing Access Control** ⚠️ CRITICAL - No caller validation on sensitive functions\n4. **Improper Felt252 Boundaries** ⚠️ HIGH - Not validating felt252 range\n5. **Unvalidated Contract Address** ⚠️ HIGH - Using untrusted contract addresses\n6. **Missing Caller Validation** ⚠️ CRITICAL - No get_caller_address() checks\n\nFor complete vulnerability patterns with code examples, see [VULNERABILITY_PATTERNS.md](resources/VULNERABILITY_PATTERNS.md).\n## 5. Scanning Workflow\n\n### Step 1: Platform Identification\n1. Verify Cairo language and StarkNet framework\n2. Check Cairo version (Cairo 1.0+ vs legacy Cairo 0)\n3. Locate contract files (`src/*.cairo`)\n4. Identify L1-L2 bridge contracts (if applicable)\n\n### Step 2: Arithmetic Safety Sweep\n```bash\n# Find felt252 usage in arithmetic\nrg \"felt252\" src/ | rg \"[-+*/]\"\n\n# Find balance/amount storage using felt252\nrg \"felt252\" src/ | rg \"balance|amount|total|supply\"\n\n# Should prefer u128, u256 instead\n```\n\n### Step 3: L1 Handler Analysis\nFor each `#[l1_handler]` function:\n- [ ] Validates `from_address` parameter\n- [ ] Checks address != zero\n- [ ] Has proper access control\n- [ ] Emits events for monitoring\n\n### Step 4: Signature Verification Review\nFor signature-based functions:\n- [ ] Includes nonce tracking\n- [ ] Nonce incremented after use\n- [ ] Domain separator includes chain ID and contract address\n- [ ] Cannot replay signatures\n\n### Step 5: L1-L2 Bridge Audit\nIf contract includes bridge functionality:\n- [ ] L1 validates address < STARKNET_FIELD_PRIME\n- [ ] L1 implements message cancellation\n- [ ] L2 validates from_address in handlers\n- [ ] Symmetric access controls L1 ↔ L2\n- [ ] Test full roundtrip flows\n\n### Step 6: Static Analysis with Caracal\n```bash\n# Run Caracal detectors\ncaracal detect src/\n\n# Specific detectors\ncaracal detect src/ --detectors unchecked-felt252-arithmetic\ncaracal detect src/ --detectors unchecked-l1-handler-from\ncaracal detect src/ --detectors missing-nonce-validation\n```\n\n---\n\n## 6. Reporting Format\n\n### Finding Template\n```markdown\n## [CRITICAL] Unchecked from_address in L1 Handler\n\n**Location**: `src/bridge.cairo:145-155` (handle_deposit function)\n\n**Description**:\nThe `handle_deposit` L1 handler function does not validate the `from_address` parameter. Any L1 contract can send messages to this function and mint tokens for arbitrary users, bypassing the intended L1 bridge access controls.\n\n**Vulnerable Code**:\n```rust\n// bridge.cairo, line 145\n#[l1_handler]\nfn handle_deposit(\n    ref self: ContractState,\n    from_address: felt252,  // Not validated!\n    user: ContractAddress,\n    amount: u256\n) {\n    let current_balance = self.balances.read(user);\n    self.balances.write(user, current_balance + amount);\n}\n```\n\n**Attack Scenario**:\n1. Attacker deploys malicious L1 contract\n2. Malicious contract calls `starknetCore.sendMessageToL2(l2Contract, selector, [attacker_address, 1000000])`\n3. L2 handler processes message without checking sender\n4. Attacker receives 1,000,000 tokens without depositing any funds\n5. Protocol suffers infinite mint vulnerability\n\n**Recommendation**:\nValidate `from_address` against authorized L1 bridge:\n```rust\n#[l1_handler]\nfn handle_deposit(\n    ref self: ContractState,\n    from_address: felt252,\n    user: ContractAddress,\n    amount: u256\n) {\n    // Validate L1 sender\n    let authorized_l1_bridge = self.l1_bridge_address.read();\n    assert(from_address == authorized_l1_bridge, 'Unauthorized L1 sender');\n\n    let current_balance = self.balances.read(user);\n    self.balances.write(user, current_balance + amount);\n}\n```\n\n**References**:\n- building-secure-contracts/not-so-smart-contracts/cairo/unchecked_l1_handler_from\n- Caracal detector: `unchecked-l1-handler-from`\n```\n\n---\n\n## 7. Priority Guidelines\n\n### Critical (Immediate Fix Required)\n- Unchecked from_address in L1 handlers (infinite mint)\n- L1-L2 address conversion issues (funds to zero address)\n\n### High (Fix Before Deployment)\n- Felt252 arithmetic overflow/underflow (balance manipulation)\n- Missing signature replay protection (replay attacks)\n- L1-L2 message failure without cancellation (locked funds)\n\n### Medium (Address in Audit)\n- Overconstrained L1-L2 interactions (trapped funds)\n\n---\n\n## 8. Testing Recommendations\n\n### Unit Tests\n```rust\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_felt252_overflow() {\n        // Test arithmetic edge cases\n    }\n\n    #[test]\n    #[should_panic]\n    fn test_unauthorized_l1_handler() {\n        // Wrong from_address should fail\n    }\n\n    #[test]\n    fn test_signature_replay_protection() {\n        // Same signature twice should fail\n    }\n}\n```\n\n### Integration Tests (with L1)\n```rust\n// Test full L1-L2 flow\n#[test]\nfn test_deposit_withdraw_roundtrip() {\n    // 1. Deposit on L1\n    // 2. Wait for L2 processing\n    // 3. Verify L2 balance\n    // 4. Withdraw to L1\n    // 5. Verify L1 balance restored\n}\n```\n\n### Caracal CI Integration\n```yaml\n# .github/workflows/security.yml\n- name: Run Caracal\n  run: |\n    pip install caracal\n    caracal detect src/ --fail-on high,critical\n```\n\n---\n\n## 9. Additional Resources\n\n- **Building Secure Contracts**: `building-secure-contracts/not-so-smart-contracts/cairo/`\n- **Caracal**: https://github.com/crytic/caracal\n- **Cairo Documentation**: https://book.cairo-lang.org/\n- **StarkNet Documentation**: https://docs.starknet.io/\n- **OpenZeppelin Cairo Contracts**: https://github.com/OpenZeppelin/cairo-contracts\n\n---\n\n## 10. Quick Reference Checklist\n\nBefore completing Cairo/StarkNet audit:\n\n**Arithmetic Safety (HIGH)**:\n- [ ] No felt252 used for balances/amounts (use u128/u256)\n- [ ] OR felt252 arithmetic has explicit bounds checking\n- [ ] Overflow/underflow scenarios tested\n\n**L1 Handler Security (CRITICAL)**:\n- [ ] ALL `#[l1_handler]` functions validate `from_address`\n- [ ] from_address compared against stored L1 contract address\n- [ ] Cannot bypass by deploying alternate L1 contract\n\n**L1-L2 Messaging (HIGH)**:\n- [ ] L1 bridge validates addresses < STARKNET_FIELD_PRIME\n- [ ] L1 bridge implements message cancellation\n- [ ] L2 handlers check from_address\n- [ ] Symmetric validation rules L1 ↔ L2\n- [ ] Full roundtrip flows tested\n\n**Signature Security (HIGH)**:\n- [ ] Signatures include nonce tracking\n- [ ] Nonce incremented after each use\n- [ ] Domain separator includes chain ID and contract address\n- [ ] Signature replay tested and prevented\n- [ ] Cross-chain replay prevented\n\n**Tool Usage**:\n- [ ] Caracal scan completed with no critical findings\n- [ ] Unit tests cover all vulnerability scenarios\n- [ ] Integration tests verify L1-L2 flows\n- [ ] Testnet deployment tested before mainnet\n", "table_row": {"skill": "cairo-vulnerability-scanner", "evidence_file": "`plugins/building-secure-contracts/skills/cairo-vulnerability-scanner/SKILL.md`", "skill_url_cell": "[link](https://github.com/trailofbits/skills/blob/main/plugins/building-secure-contracts/skills/cairo-vulnerability-scanner/SKILL.md)", "why_research_related": "It supports research on StarkNet/Cairo security by scanning Cairo contracts for platform-specific vulnerability patterns related to arithmetic, cross-layer messaging, and cryptographic operations. This can be used to systematically identify and catalog recurring vulnerability classes (such as felt252 arithmetic issues and signature replay) across StarkNet projects.", "function_explanation": "Scans Cairo/StarkNet smart contracts for 6 critical vulnerability patterns related to arithmetic safety, access control, and cross-layer messaging. Includes L1-L2 bridge audit workflows, L1 handler validation, and signature verification review. Reports findings with file references, severity levels, and recommended fixes. Supports Caracal static analyzer integration.", "execution_flow": "Auditing StarkNet smart contracts (Cairo) → Reviewing L1-L2 bridge implementations → Pre-launch security assessment of StarkNet applications → Validating cross-layer message handling → Reviewing signature verification logic → Assessing L1 handler functions → Cairo files", "evidence": "### Step 3: L1 Handler Analysis"}, "highlight_keywords": ["Scans", "CairoStarkNet", "smart", "contracts", "critical", "vulnerability", "patterns", "related", "arithmetic", "safety", "access control", "access", "control", "cross-layer messaging", "cross-layer", "messaging", "Includes L1-L2 bridge audit workflows", "Includes", "L1-L2", "bridge", "audit", "workflows", "L1 handler validation", "handler", "validation", "signature verification review", "signature", "verification", "review", "Reports findings file references"]}, {"id": "Research__03_experiment_benchmark_reproducibility_validation_part1", "skill_name": "Research", "repo": "danielmiessler/Personal_AI_Infrastructure", "theme": "03_experiment_benchmark_reproducibility_validation_part1", "theme_display": "03 Experiment & Validation (Part 1)", "status": "PARTIAL", "audit_reason": "Correct on core idea: multi-mode research workflows (quick/standard/extensive/deep investigation), multi-agent routing, customization pre-check, mandatory voice notification, and strict URL verification. However, the Function Explanation introduces specific claims not established in the provided SKILL.md excerpt, such as “web scraping, Fabric pattern processing (242+ patterns)” routing being conditional based on triggers is supported, but “enforces strict URL verification protocols before delivering any links” is supported; still, it also mentions specific providers/agents (Perplexity/Claude/Gemini) as if guaranteed, which are described in SKILL.md but may be more implementation detail than high-level. Overall it’s mostly aligned but slightly over-specifies mechanisms.", "skill_url": "https://github.com/danielmiessler/Personal_AI_Infrastructure/blob/main/Packs/pai-research-skill/src/skills/Research/SKILL.md", "skill_md_content": "---\nname: Research\ndescription: Comprehensive research and content extraction — quick/standard/extensive/deep modes with multi-agent parallel research, content retrieval, AI trends analysis, and 242+ Fabric patterns. USE WHEN research, do research, quick research, extensive research, deep investigation, find information, investigate, extract alpha, analyze content, retrieve content, use fabric, AI trends, Claude research, enhance content, extract knowledge, interview research, web scraping, YouTube extraction, standard research.\n---\n\n## ⚠️ MANDATORY TRIGGER\n\n**When user says \"research\" (in any form), ALWAYS invoke this skill.**\n\n| User Says | Action |\n|-----------|--------|\n| \"research\" / \"do research\" / \"research this\" | → Standard mode (3 agents) |\n| \"quick research\" / \"minor research\" | → Quick mode (1 agent) |\n| \"extensive research\" / \"deep research\" | → Extensive mode (12 agents) |\n| \"deep investigation\" / \"investigate [topic]\" / \"map the [X] landscape\" | → Deep Investigation (iterative) |\n\n**\"Research\" alone = Standard mode. No exceptions.**\n\n## Customization\n\n**Before executing, check for user customizations at:**\n`~/.claude/PAI/USER/SKILLCUSTOMIZATIONS/Research/`\n\nIf this directory exists, load and apply any PREFERENCES.md, configurations, or resources found there. These override default behavior. If the directory does not exist, proceed with skill defaults.\n\n\n## 🚨 MANDATORY: Voice Notification (REQUIRED BEFORE ANY ACTION)\n\n**You MUST send this notification BEFORE doing anything else when this skill is invoked.**\n\n1. **Send voice notification**:\n   ```bash\n   curl -s -X POST http://localhost:8888/notify \\\n     -H \"Content-Type: application/json\" \\\n     -d '{\"message\": \"Running the WORKFLOWNAME workflow in the Research skill to ACTION\"}' \\\n     > /dev/null 2>&1 &\n   ```\n\n2. **Output text notification**:\n   ```\n   Running the **WorkflowName** workflow in the **Research** skill to ACTION...\n   ```\n\n**This is not optional. Execute this curl command immediately upon skill invocation.**\n\n# Research Skill\n\nComprehensive research, analysis, and content extraction system.\n\n## MANDATORY: URL Verification\n\n**READ:** `UrlVerificationProtocol.md` - Every URL must be verified before delivery.\n\nResearch agents hallucinate URLs. A single broken link is a catastrophic failure.\n\n---\n\n\n## Workflow Routing\n\nRoute to the appropriate workflow based on the request.\n\n**CRITICAL:** For due diligence, company/person background checks, or vetting -> **INVOKE OSINT SKILL INSTEAD**\n\n### Research Modes (Primary Workflows)\n- Quick/minor research (1 Perplexity, 1 query) -> `Workflows/QuickResearch.md`\n- Standard research - DEFAULT (3 agents: Perplexity + Claude + Gemini) -> `Workflows/StandardResearch.md`\n- Extensive research (4 types x 3 threads = 12 agents) -> `Workflows/ExtensiveResearch.md`\n- Deep investigation / iterative research (progressive deepening, loop-compatible) -> `Workflows/DeepInvestigation.md`\n\n### Deep Content Analysis\n- Extract alpha / deep analysis / highest-alpha insights -> `Workflows/ExtractAlpha.md`\n\n### Content Retrieval\n- Difficulty accessing content (CAPTCHA, bot detection, blocking) -> `Workflows/Retrieve.md`\n- YouTube URL extraction (use `fabric -y URL` immediately) -> `Workflows/YoutubeExtraction.md`\n- Web scraping -> `Workflows/WebScraping.md`\n\n### Specific Research Types\n- Claude WebSearch only (free, no API keys) -> `Workflows/ClaudeResearch.md`\n- Perplexity API research (use Quick for single-agent) -> `Workflows/QuickResearch.md`\n- Interview preparation (Tyler Cowen style) -> `Workflows/InterviewResearch.md`\n- AI trends analysis -> `Workflows/AnalyzeAiTrends.md`\n\n### Fabric Pattern Processing\n- Use Fabric patterns (242+ specialized prompts) -> `Workflows/Fabric.md`\n\n### Content Enhancement\n- Enhance/improve content -> `Workflows/Enhance.md`\n- Extract knowledge from content -> `Workflows/ExtractKnowledge.md`\n\n---\n\n## Quick Reference\n\n**READ:** `QuickReference.md` for detailed examples and mode comparison.\n\n| Trigger | Mode | Speed |\n|---------|------|-------|\n| \"quick research\" | 1 Perplexity agent | ~10-15s |\n| \"do research\" | 3 agents (default) | ~15-30s |\n| \"extensive research\" | 12 agents | ~60-90s |\n| \"deep investigation\" | Progressive iteration | ~3-60min |\n\n---\n\n## Integration\n\n### Feeds Into\n- **blogging** - Research for blog posts\n- **newsletter** - Research for newsletters\n- **xpost** - Create posts from research\n\n### Uses\n- **be-creative** - deep thinking for extract alpha\n- **OSINT** - MANDATORY for company/people comprehensive research\n- **BrightData MCP** - CAPTCHA solving, advanced scraping\n- **Apify MCP** - RAG browser, specialized site scrapers\n\n---\n\n## Deep Investigation Mode\n\n**Progressive iterative research** that builds a persistent knowledge vault. Works in both single-run (one cycle) and loop mode (Algorithm-driven iterations).\n\n**Concept:** Broad landscape → discover entities → score importance/effort → deep-dive one at a time → loop until coverage complete.\n\n**Domain template packs** customize the investigation for specific domains:\n- `Templates/MarketResearch.md` — Companies, Products, People, Technologies, Trends, Investors\n- `Templates/ThreatLandscape.md` — Threat Actors, Campaigns, TTPs, Vulnerabilities, Tools, Defenders\n- No template? The workflow creates entity categories dynamically from the landscape research.\n\n**Example invocation:**\n```\n\"Do a deep investigation of the AI agent market\"\n→ Loads MarketResearch.md template\n→ Iteration 1: Broad landscape + first entity deep-dive\n→ Loop mode: Each iteration deep-dives the next highest-priority entity\n→ Exit: When all CRITICAL/HIGH entities researched + all categories covered\n```\n\n**Artifacts persist** at `~/.claude/MEMORY/RESEARCH/{date}_{topic}/` — the vault survives across sessions.\n\nSee `Workflows/DeepInvestigation.md` for full workflow details.\n\n---\n\n## File Organization\n\n**Working files (temporary work artifacts):** `~/.claude/MEMORY/WORK/{current_work}/`\n- Read `~/.claude/MEMORY/STATE/current-work.json` to get the `work_dir` value\n- All iterative work artifacts go in the current work item directory\n- This ties research artifacts to the work item for learning and context\n\n**History (permanent):** `~/.claude/History/research/YYYY-MM/YYYY-MM-DD_[topic]/`\n", "table_row": {"skill": "Research", "evidence_file": "`Packs/pai-research-skill/src/skills/Research/SKILL.md`", "skill_url_cell": "[link](https://github.com/danielmiessler/Personal_AI_Infrastructure/blob/main/Packs/pai-research-skill/src/skills/Research/SKILL.md)", "why_research_related": "Provides multi-mode research system (quick/standard/extensive) with parallel agent coordination and content analysis, directly supporting literature review and research investigation workflows.", "function_explanation": "Executes comprehensive research, analysis, and content extraction using a multi-agent system with configurable quick, standard, extensive, and deep investigation modes. It is invoked by triggers including \"research\", \"investigate\", \"deep investigation\", and content retrieval phrases, mandating a preliminary check for user customizations and the immediate broadcast of a local voice notification. The system conditionally routes tasks to specific workflows for content retrieval, web scraping, Fabric pattern processing (242+ patterns), and other specialized workflows. Additionally, it enforces strict URL verification protocols before delivering any links to ensure accuracy.", "execution_flow": "Quick/minor research (1 Claude, 1 query) → Standard research - DEFAULT (2 agents: Claude + Gemini) → Extensive research (3 types x 3 threads = 9 agents)", "evidence": "name: Research"}, "highlight_keywords": ["Executes comprehensive research", "Executes", "comprehensive", "research", "analysis", "content", "extraction", "multi-agent", "system", "configurable", "quick", "standard", "extensive", "deep investigation modes", "investigation", "modes", "invoked", "triggers", "investigate", "\"deep investigation\"", "content retrieval phrases", "retrieval", "phrases", "mandating", "preliminary", "check", "customizations", "immediate", "broadcast", "local"]}, {"id": "bio-genome-engineering-grna-design__03_experiment_benchmark_reproducibility_validation_part1", "skill_name": "bio-genome-engineering-grna-design", "repo": "GPTomics/bioSkills", "theme": "03_experiment_benchmark_reproducibility_validation_part1", "theme_display": "03 Experiment & Validation (Part 1)", "status": "PARTIAL", "audit_reason": "SKILL.md supports PAM scanning and scoring with Rule Set 2 and CRISPRscan, but the explanation adds Azimuth models (not mentioned in the provided SKILL.md content).", "skill_url": "https://github.com/GPTomics/bioSkills/blob/main/genome-engineering/grna-design/SKILL.md", "skill_md_content": "---\nname: bio-genome-engineering-grna-design\ndescription: Design guide RNAs for CRISPR-Cas9/Cas12a experiments using CRISPRscan and local scoring algorithms. Score guides for on-target activity using Rule Set 2 and Azimuth models. Use when designing sgRNAs for gene knockout, activation, or repression experiments.\ntool_type: python\nprimary_tool: crisprscan\n---\n\n## Version Compatibility\n\nReference examples tested with: BioPython 1.83+\n\nBefore using code patterns, verify installed versions match. If versions differ:\n- Python: `pip show <package>` then `help(module.function)` to check signatures\n\nIf code throws ImportError, AttributeError, or TypeError, introspect the installed\npackage and adapt the example to match the actual API rather than retrying.\n\n# Guide RNA Design\n\n**\"Design guide RNAs for my CRISPR knockout experiment\"** → Scan a target gene sequence for PAM sites, extract candidate spacer sequences, and score them for on-target activity using Rule Set 2 or CRISPRscan algorithms.\n- Python: custom PAM scanning with `Bio.Seq`, CRISPRscan scoring models\n\n## Find PAM Sites\n\n```python\nfrom Bio.Seq import Seq\nimport re\n\ndef find_pam_sites(sequence, pam='NGG', guide_length=20):\n    '''Find all PAM sites and extract guide sequences\n\n    PAM patterns:\n    - NGG: SpCas9 (most common)\n    - TTTN: Cas12a/Cpf1 (5' PAM)\n    - NNGRRT: SaCas9 (smaller, for AAV delivery)\n    '''\n    sequence = sequence.upper()\n    guides = []\n\n    # NGG PAM - guide is 20bp upstream of PAM\n    if pam == 'NGG':\n        for match in re.finditer(r'(?=(.GG))', sequence):\n            pos = match.start()\n            if pos >= guide_length:\n                guide = sequence[pos - guide_length:pos]\n                guides.append({\n                    'sequence': guide,\n                    'pam': sequence[pos:pos + 3],\n                    'position': pos - guide_length,\n                    'strand': '+'\n                })\n\n    # Also search reverse complement\n    rc_seq = str(Seq(sequence).reverse_complement())\n    for match in re.finditer(r'(?=(.GG))', rc_seq):\n        pos = match.start()\n        if pos >= guide_length:\n            guide = rc_seq[pos - guide_length:pos]\n            original_pos = len(sequence) - pos\n            guides.append({\n                'sequence': guide,\n                'pam': rc_seq[pos:pos + 3],\n                'position': original_pos,\n                'strand': '-'\n            })\n\n    return guides\n```\n\n## Score On-Target Activity\n\n```python\n# Rule Set 2 position-weight matrix (Doench et al. 2016)\n# Position 0 = PAM-distal, Position 19 = PAM-proximal\n# Higher scores indicate preferred nucleotides at each position\nRULE_SET_2_WEIGHTS = {\n    # Position: {nucleotide: weight}\n    0: {'A': 0, 'C': 0, 'G': 0.08, 'T': -0.08},\n    1: {'A': 0.02, 'C': -0.06, 'G': 0.06, 'T': -0.02},\n    # ... simplified - full matrix has all 20 positions\n    18: {'A': -0.07, 'C': 0.13, 'G': -0.01, 'T': -0.05},\n    19: {'A': -0.07, 'C': 0.03, 'G': 0.11, 'T': -0.07},\n}\n\ndef calculate_gc_content(sequence):\n    gc = sum(1 for nt in sequence.upper() if nt in 'GC')\n    return gc / len(sequence)\n\ndef score_guide_activity(guide_seq):\n    '''Score guide on-target activity (0-1 scale)\n\n    Scoring criteria:\n    - GC content 40-70%: optimal range (outside this = penalty)\n    - Position-specific nucleotide preferences\n    - No poly-T stretches (terminates Pol III transcription)\n\n    Interpretation:\n    - >0.6: High activity expected\n    - 0.4-0.6: Moderate activity\n    - <0.4: Low activity, consider alternatives\n    '''\n    guide_seq = guide_seq.upper()\n    score = 0.5  # Base score\n\n    # GC content penalty\n    gc = calculate_gc_content(guide_seq)\n    if gc < 0.4 or gc > 0.7:\n        score -= 0.15\n\n    # Poly-T penalty (>=4 consecutive T's)\n    if 'TTTT' in guide_seq:\n        score -= 0.3\n\n    # Position-specific scoring (simplified)\n    for pos, weights in RULE_SET_2_WEIGHTS.items():\n        if pos < len(guide_seq):\n            nt = guide_seq[pos]\n            score += weights.get(nt, 0)\n\n    return max(0, min(1, score))\n```\n\n## CRISPRscan Scoring\n\n```python\n# CRISPRscan uses a different model optimized for zebrafish\n# but works well across species for Cas9\n\ndef crisprscan_score(guide_35mer):\n    '''Score using CRISPRscan model\n\n    Input: 35-mer (6bp upstream + 20bp guide + 3bp PAM + 6bp downstream)\n    Output: Activity score 0-100\n\n    Requires the crisprscan package:\n    pip install crisprscan\n    '''\n    try:\n        import crisprscan\n        return crisprscan.score(guide_35mer)\n    except ImportError:\n        # Fallback to simplified scoring\n        return score_guide_activity(guide_35mer[6:26]) * 100\n```\n\n## Design Workflow\n\n**Goal:** Design the top N guide RNAs for a target gene, optionally restricted to coding exon regions.\n\n**Approach:** Scan both strands for PAM sites, optionally filter to guides within exon coordinates, score each guide for on-target activity using GC content and position-weight criteria, and return the highest-scoring candidates.\n\n```python\ndef design_guides_for_gene(gene_sequence, exon_coords=None, n_guides=5):\n    '''Design top N guides for a gene\n\n    Args:\n        gene_sequence: Full gene sequence (DNA)\n        exon_coords: List of (start, end) tuples for coding exons\n        n_guides: Number of top guides to return\n\n    Returns:\n        List of guide dicts sorted by activity score\n    '''\n    # Find all PAM sites\n    all_guides = find_pam_sites(gene_sequence)\n\n    # Filter to coding regions if exon coordinates provided\n    if exon_coords:\n        coding_guides = []\n        for guide in all_guides:\n            for start, end in exon_coords:\n                if start <= guide['position'] <= end:\n                    coding_guides.append(guide)\n                    break\n        all_guides = coding_guides\n\n    # Score each guide\n    for guide in all_guides:\n        guide['activity_score'] = score_guide_activity(guide['sequence'])\n\n    # Sort by activity and return top N\n    all_guides.sort(key=lambda x: x['activity_score'], reverse=True)\n    return all_guides[:n_guides]\n```\n\n## Cas12a Guide Design\n\n```python\ndef find_cas12a_guides(sequence, guide_length=23):\n    '''Find Cas12a (Cpf1) guide sequences\n\n    Cas12a differences from Cas9:\n    - 5' PAM (TTTV where V = A/C/G)\n    - Longer guide (23nt vs 20nt)\n    - Staggered cut (5nt 5' overhang)\n    - Lower off-target activity\n    '''\n    sequence = sequence.upper()\n    guides = []\n\n    # TTTV PAM pattern (5' of guide)\n    for match in re.finditer(r'TTT[ACG]', sequence):\n        pos = match.end()\n        if pos + guide_length <= len(sequence):\n            guide = sequence[pos:pos + guide_length]\n            guides.append({\n                'sequence': guide,\n                'pam': match.group(),\n                'position': pos,\n                'strand': '+',\n                'nuclease': 'Cas12a'\n            })\n\n    return guides\n```\n\n## Related Skills\n\n- genome-engineering/off-target-prediction - Check off-targets after design\n- crispr-screens/library-design - Pool multiple guides for screens\n- primer-design/primer-basics - Design flanking primers for validation\n", "table_row": {"skill": "bio-genome-engineering-grna-design", "evidence_file": "`genome-engineering/grna-design/SKILL.md`", "skill_url_cell": "[link](https://github.com/GPTomics/bioSkills/blob/main/genome-engineering/grna-design/SKILL.md)", "why_research_related": "Supports experiment execution, model development in research contexts based on: Design guide RNAs for CRISPR-Cas9/Cas12a experiments using CRISPRscan and local scoring algorithms. ...", "function_explanation": "Designs guide RNAs for CRISPR-Cas9 and Cas12a experiments by scanning target sequences for PAM sites and extracting candidate spacers. Scores guides for on-target activity using Rule Set 2, Azimuth models, and CRISPRscan algorithms. Supports filtering guides to coding exon regions and returning top-ranked candidates.", "execution_flow": "NGG: SpCas9 (most common) → TTTN: Cas12a/Cpf1 (5' PAM) → NNGRRT: SaCas9 (smaller, for AAV delivery) → GC content 40-70%: optimal range (outside this = penalty) → Position-specific nucleotide preferences → No poly-T stretches (terminates Pol III transcription) → >0.6: High activity expected", "evidence": "description: Design guide RNAs for CRISPR-Cas9/Cas12a experiments using CRISPRscan and local scoring algorithms. Score guides for on-target activity using Rule Set 2 and Azimuth models. Use when designing sgRNAs for gene knockout, activation, or repression exp"}, "highlight_keywords": ["Designs", "guide", "CRISPR-Cas9", "Cas12a", "experiments", "scanning", "target", "sequences", "sites", "extracting", "candidate", "spacers", "Scores", "guides", "on-target", "activity", "Azimuth models", "Azimuth", "models", "CRISPRscan algorithms", "CRISPRscan", "algorithms", "filtering", "coding", "regions", "returning", "top-ranked", "candidates"]}, {"id": "bio-spatial-transcriptomics-spatial-multiomics__03_experiment_benchmark_reproducibility_validation_part1", "skill_name": "bio-spatial-transcriptomics-spatial-multiomics", "repo": "GPTomics/bioSkills", "theme": "03_experiment_benchmark_reproducibility_validation_part1", "theme_display": "03 Experiment & Validation (Part 1)", "status": "PARTIAL", "audit_reason": "SKILL.md focuses on analyzing high-resolution spatial platforms (Slide-seq, Stereo-seq, Visium HD) with segmentation, binning, and integration, but the explanation expands platform coverage to Xenium and MERFISH, which are not named in the SKILL.md description (though they appear later in the body text).", "skill_url": "https://github.com/GPTomics/bioSkills/blob/main/spatial-transcriptomics/spatial-multiomics/SKILL.md", "skill_md_content": "---\nname: bio-spatial-transcriptomics-spatial-multiomics\ndescription: Analyze high-resolution spatial platforms like Slide-seq, Stereo-seq, and Visium HD. Use when working with subcellular resolution or high-density spatial data.\ntool_type: python\nprimary_tool: squidpy\n---\n\n## Version Compatibility\n\nReference examples tested with: Cellpose 3.0+, matplotlib 3.8+, numpy 1.26+, scanpy 1.10+, scipy 1.12+, spatialdata 0.1+, squidpy 1.3+\n\nBefore using code patterns, verify installed versions match. If versions differ:\n- Python: `pip show <package>` then `help(module.function)` to check signatures\n\nIf code throws ImportError, AttributeError, or TypeError, introspect the installed\npackage and adapt the example to match the actual API rather than retrying.\n\n# Spatial Multi-omics Analysis\n\n**\"Analyze my high-resolution spatial data\"** → Process subcellular-resolution spatial platforms (Xenium, MERFISH, Slide-seq, Stereo-seq) including cell segmentation, binning strategies, and multi-modal integration.\n- Python: `spatialdata` + `squidpy` for unified multi-platform analysis\n\n## Platform Comparison\n\n| Platform | Resolution | Spots/Beads | Coverage |\n|----------|------------|-------------|----------|\n| Visium | 55 µm | ~5,000 | Tissue-wide |\n| Visium HD | 2 µm | ~11M | Subcellular |\n| Slide-seq | 10 µm | ~100,000 | High-density |\n| Stereo-seq | 0.5 µm | >200M | Subcellular |\n| MERFISH | Single-molecule | N/A | Targeted genes |\n\n## Squidpy for High-Resolution Data\n\n**Goal:** Run standard spatial analyses (autocorrelation, neighborhood enrichment, ligand-receptor) on high-resolution spatial data.\n\n**Approach:** Adjust neighbor graph density for high-resolution platforms, then apply standard Squidpy workflows.\n\n```python\nimport squidpy as sq\nimport scanpy as sc\n\n# Load spatial data\nadata = sc.read_h5ad('spatial_multiomics.h5ad')\n\n# Spatial neighbors (for high-resolution, adjust n_neighs based on density)\nsq.gr.spatial_neighbors(adata, coord_type='generic', n_neighs=10, spatial_key='spatial')\n\n# Spatial autocorrelation (Moran's I)\nsq.gr.spatial_autocorr(adata, mode='moran', genes=adata.var_names[:100])\n\n# Neighborhood enrichment analysis\nsq.gr.nhood_enrichment(adata, cluster_key='cell_type')\nsq.pl.nhood_enrichment(adata, cluster_key='cell_type')\n\n# Ligand-receptor analysis\nsq.gr.ligrec(adata, n_perms=100, cluster_key='cell_type')\n```\n\n## SpatialData Framework\n\n**Goal:** Load and query multi-modal spatial data using the SpatialData unified representation.\n\n**Approach:** Use spatialdata-io readers per platform, then access images, points, shapes, and tables through a single object with spatial queries.\n\n```python\nimport spatialdata as sd\nfrom spatialdata_io import read_visium, read_xenium\n\n# Read Visium data\nsdata = read_visium('visium_output/')\n\n# Read Xenium data (10x Genomics subcellular)\nsdata = read_xenium('xenium_output/')\n\n# Read from Zarr\nsdata = sd.read_zarr('experiment.zarr')\n\n# Access different elements\nimages = sdata.images['morphology']\npoints = sdata.points['transcripts']\nshapes = sdata.shapes['cell_boundaries']\ntable = sdata.tables['adata']\n\n# Query by region\nfrom spatialdata import bounding_box_query\nroi = bounding_box_query(sdata, min_coordinate=[0, 0], max_coordinate=[1000, 1000], axes=['x', 'y'])\n```\n\n## Slide-seq/Stereo-seq Processing\n\n```python\n# For high-density data, bin spots into hexagonal grids\nimport numpy as np\n\n# Create hexagonal bins\ndef hexbin_data(adata, gridsize=50):\n    coords = adata.obsm['spatial']\n    from matplotlib.pyplot import hexbin\n    hb = hexbin(coords[:, 0], coords[:, 1], C=None, gridsize=gridsize, reduce_C_function=np.sum)\n    return hb\n\n# Squidpy visualization with hex binning\nsq.pl.spatial_scatter(adata, shape='hex', size=50, color='cluster')\n\n# Grid-based spatial neighbors for regular patterns\nsq.gr.spatial_neighbors(adata, coord_type='grid', n_rings=1)\n```\n\n## Subcellular Analysis (MERFISH/Xenium)\n\n**Goal:** Perform transcript-level and subcellular compartment analysis for single-molecule platforms.\n\n**Approach:** Segment cells with Cellpose, then assign individual transcripts to cells based on mask coordinates.\n\n```python\n# Transcript-level analysis\n# Assign transcripts to compartments\nsq.gr.co_occurrence(adata, cluster_key='compartment', spatial_key='spatial')\n\n# Cell segmentation integration\nfrom cellpose import models\nmodel = models.Cellpose(model_type='cyto2')\nmasks, flows, styles, diams = model.eval(image, diameter=30, channels=[0, 0])\n\n# Map transcripts to cells\ndef assign_transcripts_to_cells(transcripts_df, masks):\n    x, y = transcripts_df['x'].values.astype(int), transcripts_df['y'].values.astype(int)\n    transcripts_df['cell_id'] = masks[y, x]\n    return transcripts_df[transcripts_df['cell_id'] > 0]\n```\n\n## Multi-Modal Integration\n\n**Goal:** Combine spatial gene expression with histological image features for integrated analysis.\n\n**Approach:** Process and segment tissue images, extract image features, then correlate with gene expression.\n\n```python\n# Combine spatial transcriptomics with histology\nsq.im.process(adata, layer='image', method='smooth', sigma=2)\nsq.im.segment(adata, layer='image', method='watershed', thresh=0.1)\n\n# Extract image features\nsq.im.calculate_image_features(\n    adata, layer='image', features=['texture', 'summary'],\n    key_added='img_features', n_jobs=4\n)\n\n# Correlate image features with gene expression\nfrom scipy.stats import pearsonr\nfor gene in ['marker1', 'marker2']:\n    r, p = pearsonr(adata.obs['img_feature'], adata[:, gene].X.flatten())\n    print(f'{gene}: r={r:.3f}, p={p:.3e}')\n```\n\n## Visium HD Specific\n\n```python\n# Visium HD produces bin files at multiple resolutions\n# Load 8µm binned data (recommended starting point)\nadata = sc.read_h5ad('visium_hd_8um.h5ad')\n\n# Downsample to 16µm if needed for initial analysis\n# Original 2µm data available for detailed analysis\n```\n\n## Quality Metrics\n\n| Metric | Visium | High-Resolution |\n|--------|--------|-----------------|\n| Genes/spot | >2000 | >500 |\n| UMI/spot | >5000 | >1000 |\n| Spatial coverage | >80% | >50% |\n\n## Related Skills\n\n- spatial-transcriptomics/spatial-preprocessing - Standard spatial analysis\n- single-cell/preprocessing - scRNA-seq concepts\n- spatial-transcriptomics/image-analysis - Morphology processing\n- single-cell/cell-annotation - Cell type assignment\n", "table_row": {"skill": "bio-spatial-transcriptomics-spatial-multiomics", "evidence_file": "`spatial-transcriptomics/spatial-multiomics/SKILL.md`", "skill_url_cell": "[link](https://github.com/GPTomics/bioSkills/blob/main/spatial-transcriptomics/spatial-multiomics/SKILL.md)", "why_research_related": "Potentially supports research workflows: Analyze high-resolution spatial platforms like Slide-seq, Stereo-seq, and Visium HD. Use when working with subcellular r...", "function_explanation": "Processes subcellular and high-density spatial transcriptomics data from platforms such as Xenium, MERFISH, Slide-seq, Stereo-seq, and Visium HD. Covers cell segmentation, binning strategies for high-density spots, and multi-modal integration of spatial gene expression with histological image features using spatialdata and Squidpy.", "execution_flow": "single-cell/preprocessing - scRNA-seq concepts → spatial-transcriptomics/image-analysis - Morphology processing → single-cell/cell-annotation - Cell type assignment", "evidence": "# Spatial Multi-omics Analysis"}, "highlight_keywords": ["Processes", "subcellular", "high-density", "spatial", "transcriptomics", "platforms", "Xenium", "MERFISH", "Slide-seq", "Stereo-seq", "Visium HD", "Visium", "Covers cell segmentation", "Covers", "segmentation", "binning strategies high-density spots", "binning", "strategies", "spots", "multi-modal", "integration", "expression", "histological", "image", "features", "spatialdata", "Squidpy"]}, {"id": "bio-workflows-genome-assembly-pipeline__03_experiment_benchmark_reproducibility_validation_part1", "skill_name": "bio-workflows-genome-assembly-pipeline", "repo": "GPTomics/bioSkills", "theme": "03_experiment_benchmark_reproducibility_validation_part1", "theme_display": "03 Experiment & Validation (Part 1)", "status": "PARTIAL", "audit_reason": "SKILL.md includes contamination detection with BlobToolKit, but the provided SKILL.md content excerpt/pipeline overview shown does not actually include scaffolding or BlobToolKit steps beyond the one-line description; the explanation asserts scaffolding and BlobToolKit as included components, which is not evidenced in the visible content.", "skill_url": "https://github.com/GPTomics/bioSkills/blob/main/workflows/genome-assembly-pipeline/SKILL.md", "skill_md_content": "---\nname: bio-workflows-genome-assembly-pipeline\ndescription: End-to-end genome assembly workflow from reads to polished assembly with QC. Supports short reads (SPAdes), long reads (Flye), and hybrid approaches. Use when assembling genomes from raw reads.\ntool_type: cli\nprimary_tool: Flye\nworkflow: true\ndepends_on:\n  - read-qc/fastp-workflow\n  - genome-assembly/short-read-assembly\n  - genome-assembly/long-read-assembly\n  - genome-assembly/assembly-polishing\n  - genome-assembly/assembly-qc\nqc_checkpoints:\n  - after_assembly: \"N50 reasonable, total length matches expected\"\n  - after_polishing: \"Error rate reduced, QV improved\"\n  - after_busco: \"Complete BUSCOs >90%\"\n---\n\n## Version Compatibility\n\nReference examples tested with: BUSCO 5.5+, BWA 0.7.17+, Flye 2.9+, QUAST 5.2+, SPAdes 3.15+, fastp 0.23+, samtools 1.19+\n\nBefore using code patterns, verify installed versions match. If versions differ:\n- CLI: `<tool> --version` then `<tool> --help` to confirm flags\n\nIf code throws ImportError, AttributeError, or TypeError, introspect the installed\npackage and adapt the example to match the actual API rather than retrying.\n\n# Genome Assembly Pipeline\n\n**\"Assemble and polish a genome from my sequencing reads\"** → Orchestrate read QC, assembly (hifiasm, Flye, SPAdes), polishing (Medaka, Pilon), scaffolding, contamination detection (BlobToolKit), and quality assessment (QUAST, BUSCO).\n\nComplete workflow from sequencing reads to polished, quality-assessed genome assembly.\n\n## Workflow Overview\n\n```\nReads (short and/or long)\n    |\n    v\n[1. QC & Filtering] -----> fastp, NanoPlot\n    |\n    v\n[2. Assembly] -----------> SPAdes (short) or Flye (long)\n    |\n    v\n[3. Polishing] ----------> Pilon (short) or medaka (long)\n    |\n    v\n[4. QC Assessment] ------> QUAST, BUSCO\n    |\n    v\nFinal polished assembly\n```\n\n## Path A: Short-Read Assembly (SPAdes)\n\n### Step 1: QC\n\n```bash\nfastp -i reads_R1.fastq.gz -I reads_R2.fastq.gz \\\n    -o trimmed_R1.fq.gz -O trimmed_R2.fq.gz \\\n    --detect_adapter_for_pe \\\n    --qualified_quality_phred 20 \\\n    --length_required 50 \\\n    --html qc_report.html\n```\n\n### Step 2: Assembly with SPAdes\n\n```bash\n# Standard bacterial assembly\nspades.py \\\n    -1 trimmed_R1.fq.gz \\\n    -2 trimmed_R2.fq.gz \\\n    -o spades_output \\\n    --careful \\\n    -t 16 \\\n    -m 64\n\n# For isolate genomes\nspades.py --isolate \\\n    -1 trimmed_R1.fq.gz \\\n    -2 trimmed_R2.fq.gz \\\n    -o spades_output \\\n    -t 16\n```\n\n### Step 3: Polishing with Pilon\n\n```bash\n# Align reads to assembly\nbwa index spades_output/scaffolds.fasta\nbwa mem -t 16 spades_output/scaffolds.fasta \\\n    trimmed_R1.fq.gz trimmed_R2.fq.gz | \\\n    samtools sort -@ 4 -o aligned.bam\nsamtools index aligned.bam\n\n# Polish\npilon --genome spades_output/scaffolds.fasta \\\n    --frags aligned.bam \\\n    --output polished \\\n    --threads 16\n```\n\n## Path B: Long-Read Assembly (Flye)\n\n### Step 1: QC\n\n```bash\n# NanoPlot for long-read QC\nNanoPlot --fastq reads.fastq.gz \\\n    --outdir nanoplot_output \\\n    --threads 8\n```\n\n### Step 2: Assembly with Flye\n\n```bash\n# ONT raw reads\nflye --nano-raw reads.fastq.gz \\\n    --out-dir flye_output \\\n    --threads 16 \\\n    --genome-size 5m\n\n# ONT HQ reads (sup/dna_r10)\nflye --nano-hq reads.fastq.gz \\\n    --out-dir flye_output \\\n    --threads 16 \\\n    --genome-size 5m\n\n# PacBio HiFi\nflye --pacbio-hifi reads.fastq.gz \\\n    --out-dir flye_output \\\n    --threads 16 \\\n    --genome-size 5m\n```\n\n### Step 3: Polishing with medaka\n\n```bash\n# Polish with medaka (for ONT)\nmedaka_consensus \\\n    -i reads.fastq.gz \\\n    -d flye_output/assembly.fasta \\\n    -o medaka_output \\\n    -t 16 \\\n    -m r1041_e82_400bps_sup_v4.3.0  # Match your basecalling model\n```\n\n## Path C: Hybrid Assembly\n\n```bash\n# Flye with long reads, then polish with short reads\nflye --nano-hq long_reads.fastq.gz \\\n    --out-dir flye_output \\\n    --threads 16 \\\n    --genome-size 5m\n\n# Polish with short reads using Pilon\nbwa index flye_output/assembly.fasta\nbwa mem -t 16 flye_output/assembly.fasta \\\n    short_R1.fq.gz short_R2.fq.gz | \\\n    samtools sort -@ 4 -o aligned.bam\nsamtools index aligned.bam\n\npilon --genome flye_output/assembly.fasta \\\n    --frags aligned.bam \\\n    --output hybrid_polished \\\n    --threads 16\n```\n\n## Step 4: Quality Assessment\n\n### QUAST\n\n```bash\nquast.py polished.fasta \\\n    -r reference.fasta \\\n    -g genes.gff \\\n    -o quast_output \\\n    -t 8\n\n# Without reference\nquast.py polished.fasta \\\n    -o quast_output \\\n    -t 8\n```\n\n### BUSCO\n\n```bash\n# Download lineage database\nbusco --download bacteria_odb10\n\n# Run BUSCO\nbusco -i polished.fasta \\\n    -l bacteria_odb10 \\\n    -o busco_output \\\n    -m genome \\\n    -c 8\n```\n\n## Parameter Recommendations\n\n| Tool | Parameter | Bacteria | Eukaryote |\n|------|-----------|----------|-----------|\n| SPAdes | --careful | Yes | Optional |\n| SPAdes | -m | 64GB | 256GB+ |\n| Flye | --genome-size | 5m | Species-specific |\n| Flye | --meta | If metagenome | No |\n| BUSCO | -l | bacteria_odb10 | eukaryota_odb10 |\n\n## Troubleshooting\n\n| Issue | Likely Cause | Solution |\n|-------|--------------|----------|\n| Fragmented assembly | Low coverage, repetitive genome | Increase coverage, use long reads |\n| Low N50 | Short reads only | Add long reads for scaffolding |\n| Low BUSCO | Incomplete assembly, wrong lineage | Check coverage, try different lineage |\n| Assembly too large | Contamination, heterozygosity | Filter reads, check for contamination |\n\n## Complete Pipeline Script\n\n```bash\n#!/bin/bash\nset -e\n\nTHREADS=16\nGENOME_SIZE=\"5m\"\nLONG_READS=\"long_reads.fastq.gz\"\nSHORT_R1=\"short_R1.fastq.gz\"\nSHORT_R2=\"short_R2.fastq.gz\"\nBUSCO_LINEAGE=\"bacteria_odb10\"\nOUTDIR=\"assembly_results\"\n\nmkdir -p ${OUTDIR}/{qc,assembly,polished,quast,busco}\n\n# Step 1: QC\necho \"=== QC ===\"\nNanoPlot --fastq ${LONG_READS} --outdir ${OUTDIR}/qc/nanoplot -t ${THREADS}\nfastp -i ${SHORT_R1} -I ${SHORT_R2} \\\n    -o ${OUTDIR}/qc/short_R1.fq.gz -O ${OUTDIR}/qc/short_R2.fq.gz \\\n    --html ${OUTDIR}/qc/fastp.html\n\n# Step 2: Assembly with Flye\necho \"=== Assembly ===\"\nflye --nano-hq ${LONG_READS} \\\n    --out-dir ${OUTDIR}/assembly \\\n    --threads ${THREADS} \\\n    --genome-size ${GENOME_SIZE}\n\n# Step 3: Polish with short reads\necho \"=== Polishing ===\"\nbwa index ${OUTDIR}/assembly/assembly.fasta\nbwa mem -t ${THREADS} ${OUTDIR}/assembly/assembly.fasta \\\n    ${OUTDIR}/qc/short_R1.fq.gz ${OUTDIR}/qc/short_R2.fq.gz | \\\n    samtools sort -@ 4 -o ${OUTDIR}/polished/aligned.bam\nsamtools index ${OUTDIR}/polished/aligned.bam\n\npilon --genome ${OUTDIR}/assembly/assembly.fasta \\\n    --frags ${OUTDIR}/polished/aligned.bam \\\n    --output ${OUTDIR}/polished/final \\\n    --threads ${THREADS}\n\n# Step 4: QC\necho \"=== Quality Assessment ===\"\nquast.py ${OUTDIR}/polished/final.fasta -o ${OUTDIR}/quast -t ${THREADS}\nbusco -i ${OUTDIR}/polished/final.fasta -l ${BUSCO_LINEAGE} \\\n    -o busco -m genome -c ${THREADS} --out_path ${OUTDIR}\n\necho \"=== Assembly Complete ===\"\necho \"Final assembly: ${OUTDIR}/polished/final.fasta\"\ncat ${OUTDIR}/quast/report.txt\n```\n\n## Related Skills\n\n- genome-assembly/short-read-assembly - SPAdes details\n- genome-assembly/long-read-assembly - Flye, Canu, Hifiasm\n- genome-assembly/assembly-polishing - Pilon, medaka, Racon\n- genome-assembly/assembly-qc - QUAST, BUSCO metrics\n", "table_row": {"skill": "bio-workflows-genome-assembly-pipeline", "evidence_file": "`workflows/genome-assembly-pipeline/SKILL.md`", "skill_url_cell": "[link](https://github.com/GPTomics/bioSkills/blob/main/workflows/genome-assembly-pipeline/SKILL.md)", "why_research_related": "Potentially supports research workflows: End-to-end genome assembly workflow from reads to polished assembly with QC. Supports short reads (SPAdes), long reads (...", "function_explanation": "End-to-end genome assembly workflow from reads to polished assembly with QC, including read QC, assembly, polishing, scaffolding, contamination detection (BlobToolKit), and quality assessment (QUAST, BUSCO). Supports short reads (SPAdes), long reads (Flye), and hybrid approaches. Use when assembling genomes from raw reads.", "execution_flow": "read-qc/fastp-workflow → genome-assembly/short-read-assembly → genome-assembly/long-read-assembly → genome-assembly/assembly-polishing → genome-assembly/assembly-qc → after_assembly: \"N50 reasonable, total length matches expected\" → after_polishing: \"Error rate reduced, QV improved\"", "evidence": "workflows/genome-assembly-pipeline/SKILL.md"}, "highlight_keywords": ["End-to-end", "genome", "assembly", "workflow", "reads", "polished", "read QC", "polishing", "scaffolding", "contamination detection", "contamination", "detection", "BlobToolKit", "quality assessment", "quality", "assessment", "QUAST", "BUSCO", "short reads", "short", "SPAdes", "long reads", "hybrid approaches", "hybrid", "approaches", "assembling", "genomes"]}, {"id": "bio-workflows-spatial-pipeline__03_experiment_benchmark_reproducibility_validation_part1", "skill_name": "bio-workflows-spatial-pipeline", "repo": "GPTomics/bioSkills", "theme": "03_experiment_benchmark_reproducibility_validation_part1", "theme_display": "03 Experiment & Validation (Part 1)", "status": "PARTIAL", "audit_reason": "SKILL.md describes loading, preprocessing, spatial analysis, domain detection, and visualization; the explanation additionally claims cell-cell communication and explicit cell2location deconvolution orchestration, which are stated in the SKILL.md short summary line but are not evidenced in the visible step-by-step content provided.", "skill_url": "https://github.com/GPTomics/bioSkills/blob/main/workflows/spatial-pipeline/SKILL.md", "skill_md_content": "---\nname: bio-workflows-spatial-pipeline\ndescription: End-to-end spatial transcriptomics workflow for Visium/Xenium data. Covers data loading, preprocessing, spatial analysis, domain detection, and visualization with Squidpy. Use when analyzing spatial transcriptomics data.\ntool_type: python\nprimary_tool: Squidpy\nworkflow: true\ndepends_on:\n  - spatial-transcriptomics/spatial-data-io\n  - spatial-transcriptomics/spatial-preprocessing\n  - spatial-transcriptomics/spatial-neighbors\n  - spatial-transcriptomics/spatial-statistics\n  - spatial-transcriptomics/spatial-domains\n  - spatial-transcriptomics/spatial-visualization\nqc_checkpoints:\n  - after_loading: \"Spots/cells detected, image aligned\"\n  - after_qc: \"Low-quality spots filtered, genes detected\"\n  - after_clustering: \"Spatial domains correspond to tissue regions\"\n---\n\n## Version Compatibility\n\nReference examples tested with: matplotlib 3.8+, numpy 1.26+, scanpy 1.10+, squidpy 1.3+\n\nBefore using code patterns, verify installed versions match. If versions differ:\n- Python: `pip show <package>` then `help(module.function)` to check signatures\n\nIf code throws ImportError, AttributeError, or TypeError, introspect the installed\npackage and adapt the example to match the actual API rather than retrying.\n\n# Spatial Transcriptomics Pipeline\n\n**\"Analyze my spatial transcriptomics data end-to-end\"** → Orchestrate data loading (squidpy/scanpy), QC, normalization, spatial domain detection, deconvolution (cell2location), spatial neighbor analysis, cell-cell communication, and tissue visualization.\n\nComplete workflow for analyzing Visium, Xenium, or other spatial transcriptomics data.\n\n## Workflow Overview\n\n```\nSpatial data (Space Ranger output)\n    |\n    v\n[1. Load Data] ---------> Read Visium/Xenium\n    |\n    v\n[2. QC & Preprocessing] -> Filter, normalize\n    |\n    v\n[3. Clustering] --------> Standard scRNA-seq clustering\n    |\n    v\n[4. Spatial Analysis] --> Neighbors, statistics\n    |\n    v\n[5. Domain Detection] --> Spatial domains\n    |\n    v\n[6. Visualization] -----> Spatial plots\n    |\n    v\nAnnotated spatial data\n```\n\n## Primary Path: Squidpy + Scanpy\n\n### Step 1: Load Data\n\n```python\nimport scanpy as sc\nimport squidpy as sq\nimport numpy as np\nimport
